        :root {
            --app-height: 100%;
        }
        html, body {
            height: 100dvh;

            overflow: hidden;
            background-color: #f0f9ff;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            /* Garante que o conteúdo respeite o notch e safe areas */
            padding-top: env(safe-area-inset-top);
            display: flex;
            flex-direction: column;
            overscroll-behavior-y: none;
        }
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Scroll suave dentro dos componentes */
        .app-main-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        /* Esconder scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }
